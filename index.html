<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産管理</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>
body { font-family: sans-serif; padding: 20px; }
input, button { margin: 5px; padding: 5px; }
</style>
</head>

<body>

<h2>📊 資産管理（最小版）</h2>

<input id="name" placeholder="資産の種類">
<input id="amount" type="number" placeholder="金額">
<button onclick="add()">追加</button>

<h3>合計：<span id="total">0</span> 円</h3>

<ul id="list"></ul>

<canvas id="chart"></canvas>

<script>
let assets = [];

function format(num){
  return num.toLocaleString();
}

function add(){
  const name = document.getElementById("name").value;
  const amount = Number(document.getElementById("amount").value);

  if(!name || !amount) return;

  assets.push({name, amount});
  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  assets.forEach(a=>{
    list.innerHTML += `<li>${a.name}：${format(a.amount)}円</li>`;
  });

  const total = assets.reduce((s,a)=>s+a.amount,0);
  document.getElementById("total").textContent = format(total);

  drawChart();
}

function drawChart(){
  const labels = assets.map(a=>a.name);
  const data = assets.map(a=>a.amount);

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
      labels,
      datasets: [{
        data
      }]
    }
  });
}
</script>

</body>
</html>
