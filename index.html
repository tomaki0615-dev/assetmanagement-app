<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産分析アプリ</title>

<style>
body {
  font-family: -apple-system;
  background: #f5f7fb;
  padding: 10px;
}

/* カード */
.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  margin-bottom: 12px;
}

/* 入力 */
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* ボタン */
button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #4CAF50;
  color: white;
  width: 100%;
}

/* 🔥 カテゴリUI（改善版） */
#categoryList {
  display: flex;
  overflow-x: auto;
  white-space: nowrap;
  padding-bottom: 5px;
}

#categoryList::-webkit-scrollbar {
  display: none;
}

.category-btn {
  flex: 0 0 auto;
  padding: 6px 12px;
  margin-right: 6px;
  border-radius: 20px;
  border: 1px solid #ccc;
  background: #eee;
  font-size: 13px;
}

.active {
  background: #4CAF50;
  color: white;
  border: none;
}

/* グラフ */
.chart-scroll {
  overflow-x: auto;
}

canvas {
  height: 250px;
}
</style>
</head>

<body>

<h2>📊 資産アプリ</h2>

<div class="card">
  <input id="newCategory" placeholder="カテゴリ追加">
  <button onclick="addCategory()">追加</button>
  <div id="categoryList"></div>
</div>

<div class="card">
  <input id="date" type="date">
  <input id="amount" type="number" placeholder="金額">
  <button onclick="addRecord()">記録</button>
</div>

<div class="card">
  <select id="graphType" onchange="drawChart()">
    <option value="total">総額推移</option>
    <option value="category">カテゴリ別推移</option>
  </select>

  <div class="chart-scroll">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// ===== 初期カテゴリ =====
let defaultCategories = ["💴現金","📈株式","🌱投資信託","₿仮想通貨","🏦年金"];

let categories = JSON.parse(localStorage.getItem("categories"));
if(!categories){
  categories = defaultCategories;
  localStorage.setItem("categories", JSON.stringify(categories));
}

let records = JSON.parse(localStorage.getItem("records")) || [];
let selectedCategory = categories[0];

// ===== カテゴリ =====
function addCategory(){
  const name = document.getElementById("newCategory").value;
  if(!name) return;

  categories.push(name);
  save();
  render();
}

function renderCategories(){
  const div = document.getElementById("categoryList");
  div.innerHTML = "";

  categories.forEach(c=>{
    div.innerHTML += `
      <button class="category-btn ${c===selectedCategory?'active':''}"
        onclick="selectCategory('${c}')">${c}</button>
    `;
  });
}

function selectCategory(c){
  selectedCategory = c;
  render();
}

// ===== 記録 =====
function addRecord(){
  const date = document.getElementById("date").value;
  const amount = Number(document.getElementById("amount").value);

  if(!date || !amount) return;

  records.push({
    date,
    category: selectedCategory,
    amount
  });

  records.sort((a,b)=>new Date(a.date)-new Date(b.date));

  save();
  render();
}

// ===== 保存 =====
function save(){
  localStorage.setItem("categories", JSON.stringify(categories));
  localStorage.setItem("records", JSON.stringify(records));
}

// ===== 描画 =====
function render(){
  renderCategories();
  drawChart();
}

// ===== グラフ =====
function drawChart(){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(records.length === 0) return;

  const type = document.getElementById("graphType").value;

  let dateMap = {};

  records.forEach(r=>{
    if(!dateMap[r.date]) dateMap[r.date] = [];
    dateMap[r.date].push(r);
  });

  const dates = Object.keys(dateMap);

  let values = [];

  if(type === "total"){
    values = dates.map(d =>
      dateMap[d].reduce((sum,r)=>sum+r.amount,0)
    );
  }

  if(type === "category"){
    values = dates.map(d =>
      dateMap[d]
        .filter(r=>r.category === selectedCategory)
        .reduce((sum,r)=>sum+r.amount,0)
    );
  }

  const max = Math.max(...values,1);

  // 横長対応
  canvas.width = dates.length * 60;

  let prevX = 0;
  let prevY = 0;

  dates.forEach((date,i)=>{
    const x = i * 60 + 30;
    const y = 220 - (values[i]/max)*180;

    if(i > 0){
      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(x, y);
      ctx.strokeStyle = "#4CAF50";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fillStyle = "#4CAF50";
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.font = "10px sans-serif";
    ctx.fillText(date.slice(5), x-10, 240);

    prevX = x;
    prevY = y;
  });
}

// 初期表示
render();
</script>

</body>
</html>
