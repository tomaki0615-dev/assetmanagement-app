<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産管理（完全安定版）</title>

<!-- ✅ 安定版 Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

input, button {
  margin: 5px;
  padding: 8px;
}

/* ✅ 強制サイズ確保 */
.chart-box {
  width: 300px;
  height: 300px;
  margin-top: 20px;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<h2>📊 資産管理（完全安定版）</h2>

<input id="name" placeholder="資産の種類">
<input id="amount" type="number" placeholder="金額">
<button onclick="add()">追加</button>

<h3>合計：<span id="total">0</span> 円</h3>

<ul id="list"></ul>

<div class="chart-box">
  <!-- ✅ サイズ直指定 -->
  <canvas id="chart" width="300" height="300"></canvas>
</div>

<script>
// ===== データ =====
let assets = [];

// ===== カンマ =====
function format(num){
  return num.toLocaleString();
}

// ===== 追加 =====
function add(){
  const name = document.getElementById("name").value;
  const amount = Number(document.getElementById("amount").value);

  if(!name || !amount) return alert("入力してね");

  assets.push({name, amount});
  render();
}

// ===== 描画 =====
function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  assets.forEach(a=>{
    list.innerHTML += `<li>${a.name}：${format(a.amount)}円</li>`;
  });

  const total = assets.reduce((s,a)=>s+a.amount,0);
  document.getElementById("total").textContent = format(total);

  drawChart();
}

// ===== グラフ =====
function drawChart(){

  // ✅ Chart.js読み込み確認（デバッグ）
  console.log("Chart:", typeof Chart);

  const labels = assets.map(a=>a.name);
  const data = assets.map(a=>a.amount);

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
      labels,
      datasets: [{
        data
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}
</script>

</body>
</html>
