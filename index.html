<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system;
  background: #f5f7fb;
  padding: 10px;
  margin: 0;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 14px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}

/* 🔥 日付コンパクト */
.date-row {
  display: flex;
  gap: 8px;
}

#date {
  flex: 1;
}

#amount {
  flex: 2;
}

/* カテゴリ */
#categoryList {
  display: flex;
  overflow-x: auto;
  gap: 6px;
  margin-bottom: 10px;
}

.category-wrap {
  display: flex;
  align-items: center;
}

.category-btn {
  padding: 6px 12px;
  border-radius: 20px;
  background: #eee;
  border: 1px solid #ccc;
  font-size: 13px;
}

.category-btn.active {
  background: #4CAF50;
  color: white;
}

.delete-btn {
  margin-left: 4px;
  background: red;
  color: white;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  padding: 0;
  font-size: 12px;
}

/* グラフ */
.chart-scroll {
  overflow-x: auto;
  position: relative;
}

canvas {
  height: 260px;
}

.tooltip {
  position: absolute;
  background: black;
  color: white;
  padding: 6px;
  border-radius: 6px;
  font-size: 12px;
  display: none;
}
</style>
</head>

<body>

<h2>📊 資産アプリ</h2>

<div class="card">
  <!-- 🔥 ①カテゴリボタンを上に -->
  <div id="categoryList"></div>

  <!-- 🔥 ②入力欄を下に -->
  <input id="newCategory" placeholder="カテゴリ追加">
  <button id="addCategoryBtn">追加</button>
</div>

<div class="card">
  <!-- 🔥 日付＋金額 横並び -->
  <div class="date-row">
    <input id="date" type="date">
    <input id="amount" type="number" placeholder="金額">
  </div>
  <button id="addRecordBtn">記録</button>
</div>

<div class="card">
  <select id="graphType">
    <option value="total">総額</option>
    <option value="category">カテゴリ別</option>
  </select>

  <div class="chart-scroll">
    <canvas id="chart"></canvas>
    <div id="tooltip" class="tooltip"></div>
  </div>
</div>

<script>
let categories = JSON.parse(localStorage.getItem("categories")) || ["現金"];
let records = JSON.parse(localStorage.getItem("records")) || [];
let selectedCategory = categories[0];

// ===== 🔥 今日をデフォルト =====
document.getElementById("date").value = new Date().toISOString().split("T")[0];

// ===== カテゴリ追加 =====
document.getElementById("addCategoryBtn").onclick = () => {
  const input = document.getElementById("newCategory");
  const name = input.value.trim();

  if(!name) return alert("入力してね");
  if(categories.includes(name)) return alert("もうある");

  categories.push(name);
  input.value = "";
  save();
  render();
};

// ===== 削除 =====
function deleteCategory(name){
  if(!confirm("削除する？")) return;

  categories = categories.filter(c => c !== name);
  if(selectedCategory === name){
    selectedCategory = categories[0] || "";
  }

  save();
  render();
}

// ===== 描画 =====
function renderCategories(){
  const div = document.getElementById("categoryList");
  div.innerHTML = "";

  categories.forEach(c=>{
    const wrap = document.createElement("div");

    const btn = document.createElement("button");
    btn.className = "category-btn";
    if(c === selectedCategory) btn.classList.add("active");
    btn.textContent = c;

    btn.onclick = () => {
      selectedCategory = c;
      render();
    };

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.textContent = "×";
    del.onclick = () => deleteCategory(c);

    wrap.appendChild(btn);
    wrap.appendChild(del);
    div.appendChild(wrap);
  });
}

// ===== 記録 =====
document.getElementById("addRecordBtn").onclick = () => {
  const date = document.getElementById("date").value;
  const amount = Number(document.getElementById("amount").value);

  if(!date || !amount) return alert("入力してね");

  records.push({date, category:selectedCategory, amount});
  records.sort((a,b)=>new Date(a.date)-new Date(b.date));

  save();
  render();
};

// ===== 保存 =====
function save(){
  localStorage.setItem("categories", JSON.stringify(categories));
  localStorage.setItem("records", JSON.stringify(records));
}

// ===== グラフ（そのまま） =====
function drawChart(){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr,dpr);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(records.length === 0) return;

  let dateMap = {};
  records.forEach(r=>{
    if(!dateMap[r.date]) dateMap[r.date] = [];
    dateMap[r.date].push(r);
  });

  const dates = Object.keys(dateMap);
  let values = [];

  const type = document.getElementById("graphType").value;

  if(type === "total"){
    values = dates.map(d =>
      dateMap[d].reduce((sum,r)=>sum+r.amount,0)
    );
  }else{
    values = dates.map(d =>
      dateMap[d]
        .filter(r=>r.category === selectedCategory)
        .reduce((sum,r)=>sum+r.amount,0)
    );
  }

  const max = Math.max(...values,1);
  canvas.style.width = (dates.length * 60) + "px";

  let points = [];

  for(let i=0;i<5;i++){
    const y = 200 - (i/5)*180;
    ctx.strokeStyle = "#ddd";
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(dates.length*60,y);
    ctx.stroke();
  }

  values.forEach((v,i)=>{
    const x = i*60 + 30;
    const y = 200 - (v/max)*180;

    points.push({x,y,value:v,date:dates[i]});

    if(i>0){
      ctx.beginPath();
      ctx.moveTo(points[i-1].x, points[i-1].y);
      ctx.lineTo(x,y);
      ctx.strokeStyle="#4CAF50";
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle="#4CAF50";
    ctx.fill();

    if(i%2===0){
      ctx.fillText(dates[i].slice(5).replace("-","/"), x-15, 220);
    }
  });

  canvas.onclick = function(e){
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;

    let closest = points.reduce((a,b)=>
      Math.abs(b.x-x) < Math.abs(a.x-x) ? b : a
    );

    const tooltip = document.getElementById("tooltip");
    tooltip.style.display = "block";
    tooltip.style.left = closest.x + "px";
    tooltip.style.top = closest.y + "px";
    tooltip.innerHTML = `
      ${closest.date}<br>
      ${closest.value.toLocaleString()}円
    `;
  }
}

document.getElementById("graphType").onchange = drawChart;

function render(){
  renderCategories();
  drawChart();
}

render();
</script>

</body>
</html>
