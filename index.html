<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産グラフチャレンジ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

/* グラフサイズ固定（超重要） */
#chart {
  width: 300px !important;
  height: 300px !important;
}
</style>
</head>

<body>

<h2>📊 資産グラフ（リスタート版）</h2>

<input id="name" placeholder="資産名">
<input id="amount" type="number" placeholder="金額">
<button onclick="add()">追加</button>

<h3>合計：<span id="total"></span> 円</h3>

<ul id="list"></ul>

<canvas id="chart"></canvas>

<script>
// 初期データ（これ重要）
let assets = [
  { name: "現金", amount: 100000 }
];

function format(n){
  return n.toLocaleString();
}

function add(){
  const name = document.getElementById("name").value;
  const amount = Number(document.getElementById("amount").value);

  if(!name || !amount) return;

  assets.push({name, amount});
  render();
}

function render(){
  // リスト
  const list = document.getElementById("list");
  list.innerHTML = "";
  assets.forEach(a=>{
    list.innerHTML += `<li>${a.name}：${format(a.amount)}円</li>`;
  });

  // 合計
  const total = assets.reduce((s,a)=>s+a.amount,0);
  document.getElementById("total").textContent = format(total);

  drawChart();
}

function drawChart(){
  const labels = assets.map(a=>a.name);
  const data = assets.map(a=>a.amount);

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
      labels,
      datasets: [{
        data
      }]
    },
    options: {
      responsive: false
    }
  });
}

// 🔥 初期描画（これが命）
window.onload = function(){
  render();
};
</script>

</body>
</html>
