<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産分析アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system;
  background: #f5f7fb;
  padding: 10px;
  margin: 0;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 14px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  height: 44px;
}

/* カテゴリ */
#categoryList {
  display: flex;
  overflow-x: auto;
  gap: 6px;
}

.category-wrap {
  display: flex;
  align-items: center;
}

.category-btn {
  padding: 6px 12px;
  border-radius: 20px;
  background: #eee;
  border: 1px solid #ccc;
  font-size: 13px;
}

.active {
  background: #4CAF50;
  color: white;
  border: none;
}

/* 削除ボタン */
.delete-btn {
  margin-left: 4px;
  background: red;
  color: white;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 12px;
  padding: 0;
}
</style>
</head>

<body>

<h2>📊 資産アプリ</h2>

<div class="card">
  <input id="newCategory" placeholder="カテゴリ追加">
  <button onclick="addCategory()">追加</button>
  <div id="categoryList"></div>
</div>

<script>
let categories = JSON.parse(localStorage.getItem("categories")) || ["💴現金"];
let selectedCategory = categories[0];

// ===== 追加 =====
function addCategory(){
  const input = document.getElementById("newCategory");
  const name = input.value.trim();

  if(!name){
    alert("カテゴリ名を入力してね");
    return;
  }

  if(categories.includes(name)){
    alert("すでにあるよ");
    return;
  }

  categories.push(name);
  input.value = ""; // ←重要
  save();
  render();
}

// ===== 削除 =====
function deleteCategory(name){
  if(!confirm(name + " を削除する？")) return;

  categories = categories.filter(c => c !== name);

  if(selectedCategory === name){
    selectedCategory = categories[0] || "";
  }

  save();
  render();
}

// ===== 描画 =====
function render(){
  const div = document.getElementById("categoryList");
  div.innerHTML = "";

  categories.forEach(c=>{
    div.innerHTML += `
      <div class="category-wrap">
        <button class="category-btn ${c===selectedCategory?'active':''}"
          onclick="selectCategory('${c}')">${c}</button>

        <button class="delete-btn"
          onclick="deleteCategory('${c}')">×</button>
      </div>
    `;
  });
}

// ===== 選択 =====
function selectCategory(c){
  selectedCategory = c;
  render();
}

// ===== 保存 =====
function save(){
  localStorage.setItem("categories", JSON.stringify(categories));
}

// 初期表示
render();
</script>

</body>
</html>
