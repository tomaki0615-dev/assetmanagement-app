<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産管理（完成版）</title>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

/* 入力 */
input, button {
  margin: 5px;
  padding: 8px;
  font-size: 14px;
}

/* グラフ領域（ここが超重要） */
.chart-container {
  width: 100%;
  max-width: 400px;
  height: 300px;
  margin-top: 20px;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<h2>📊 資産管理（完成版）</h2>

<input id="name" placeholder="資産の種類">
<input id="amount" type="number" placeholder="金額">
<button onclick="add()">追加</button>

<h3>合計：<span id="total">0</span> 円</h3>

<ul id="list"></ul>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>

<script>
let assets = [];

function format(num){
  return num.toLocaleString();
}

function add(){
  const name = document.getElementById("name").value;
  const amount = Number(document.getElementById("amount").value);

  if(!name || !amount) return alert("入力してね");

  assets.push({name, amount});
  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  assets.forEach(a=>{
    list.innerHTML += `<li>${a.name}：${format(a.amount)}円</li>`;
  });

  const total = assets.reduce((s,a)=>s+a.amount,0);
  document.getElementById("total").textContent = format(total);

  drawChart();
}

function drawChart(){
  const labels = assets.map(a=>a.name);
  const data = assets.map(a=>a.amount);

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
      labels,
      datasets: [{
        data
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}
</script>

</body>
</html>
