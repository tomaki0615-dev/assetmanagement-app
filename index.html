<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産分析アプリ 完全版</title>

<style>
body { font-family: sans-serif; padding:20px; }

/* 入力 */
input, button, select {
  margin:5px;
  padding:6px;
}

/* カテゴリボタン */
.category-btn {
  padding:6px 10px;
  margin:3px;
  border:1px solid #333;
  background:#eee;
  cursor:pointer;
}

.active {
  background:#4CAF50;
  color:white;
}

/* グラフ */
canvas {
  margin-top:20px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>📊 資産分析アプリ</h2>

<!-- カテゴリ作成 -->
<input id="newCategory" placeholder="カテゴリ追加">
<button onclick="addCategory()">追加</button>

<div id="categoryList"></div>

<hr>

<input id="date" type="date">
<input id="amount" type="number" placeholder="金額">
<button onclick="addRecord()">記録</button>

<br>

<select id="graphType" onchange="drawChart()">
  <option value="total">総額</option>
  <option value="category">カテゴリ別</option>
</select>

<ul id="list"></ul>

<canvas id="chart" width="350" height="220"></canvas>

<script>
let categories = JSON.parse(localStorage.getItem("categories")) || ["現金"];
let records = JSON.parse(localStorage.getItem("records")) || [];

let selectedCategory = categories[0];

// ===== カテゴリ追加 =====
function addCategory(){
  const name = document.getElementById("newCategory").value;
  if(!name) return;

  categories.push(name);
  save();
  renderCategories();
}

// ===== カテゴリ表示 =====
function renderCategories(){
  const div = document.getElementById("categoryList");
  div.innerHTML = "";

  categories.forEach((c,i)=>{
    div.innerHTML += `
      <button class="category-btn ${c===selectedCategory?'active':''}"
        onclick="selectCategory('${c}')">${c}</button>
      <button onclick="editCategory(${i})">✏️</button>
      <button onclick="deleteCategory(${i})">❌</button>
    `;
  });
}

// ===== 選択 =====
function selectCategory(c){
  selectedCategory = c;
  renderCategories();
}

// ===== 編集 =====
function editCategory(i){
  const newName = prompt("新しい名前", categories[i]);
  if(!newName) return;

  const old = categories[i];
  categories[i] = newName;

  // recordsも更新
  records.forEach(r=>{
    if(r.category === old) r.category = newName;
  });

  save();
  render();
}

// ===== 削除 =====
function deleteCategory(i){
  const name = categories[i];

  if(!confirm("削除する？")) return;

  categories.splice(i,1);

  // recordsも削除
  records = records.filter(r=>r.category !== name);

  save();
  render();
}

// ===== 記録 =====
function addRecord(){
  const date = document.getElementById("date").value;
  const amount = Number(document.getElementById("amount").value);

  if(!date || !amount) return;

  records.push({
    date,
    category: selectedCategory,
    amount
  });

  records.sort((a,b)=>new Date(a.date)-new Date(b.date));

  save();
  render();
}

// ===== 保存 =====
function save(){
  localStorage.setItem("categories", JSON.stringify(categories));
  localStorage.setItem("records", JSON.stringify(records));
}

// ===== 表示 =====
function render(){
  renderCategories();
  renderList();
  drawChart();
}

// ===== 一覧 =====
function renderList(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.forEach((r,i)=>{
    list.innerHTML += `
      <li>
        ${r.date} / ${r.category}：${r.amount.toLocaleString()}円
        <button onclick="del(${i})">削除</button>
      </li>
    `;
  });
}

// ===== 削除 =====
function del(i){
  records.splice(i,1);
  save();
  render();
}

// ===== グラフ =====
function drawChart(){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(records.length === 0) return;

  const type = document.getElementById("graphType").value;

  let dataMap = {};

  if(type === "total"){
    // 日付ごと合計
    records.forEach(r=>{
      dataMap[r.date] = (dataMap[r.date]||0) + r.amount;
    });
  }

  if(type === "category"){
    // カテゴリ合計
    records.forEach(r=>{
      dataMap[r.category] = (dataMap[r.category]||0) + r.amount;
    });
  }

  const labels = Object.keys(dataMap);
  const values = Object.values(dataMap);

  const max = Math.max(...values);

  const barWidth = 30;
  const gap = 10;

  labels.forEach((label,i)=>{
    const x = i*(barWidth+gap)+30;
    const height = (values[i]/max)*150;
    const y = 180-height;

    ctx.fillStyle = "#4CAF50";
    ctx.fillRect(x,y,barWidth,height);

    ctx.fillStyle = "#000";
    ctx.font = "10px sans-serif";
    ctx.fillText(label.slice(-5), x-5, 200);
  });
}

// 初期
render();
</script>

</body>
</html>
