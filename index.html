<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産グラフ（確実表示版）</title>

<style>
body { font-family: sans-serif; padding:20px; }
canvas { margin-top:20px; }
</style>
</head>

<body>

<h2>📊 資産グラフ（確実表示版）</h2>

<input id="name" placeholder="資産名">
<input id="amount" type="number" placeholder="金額">
<button onclick="add()">追加</button>

<h3>合計：<span id="total"></span> 円</h3>

<ul id="list"></ul>

<canvas id="chart" width="300" height="300"></canvas>

<script>
let assets = [
  { name: "現金", amount: 100000 }
];

function format(n){
  return n.toLocaleString();
}

function add(){
  const name = document.getElementById("name").value;
  const amount = Number(document.getElementById("amount").value);

  if(!name || !amount) return;

  assets.push({name, amount});
  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  assets.forEach(a=>{
    list.innerHTML += `<li>${a.name}：${format(a.amount)}円</li>`;
  });

  const total = assets.reduce((s,a)=>s+a.amount,0);
  document.getElementById("total").textContent = format(total);

  drawChart();
}

function drawChart(){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  const total = assets.reduce((s,a)=>s+a.amount,0);

  let start = 0;

  assets.forEach((a, i)=>{
    const slice = (a.amount / total) * 2 * Math.PI;

    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,start,start+slice);
    ctx.fillStyle = `hsl(${i*100},70%,60%)`;
    ctx.fill();

    start += slice;
  });
}

window.onload = render;
</script>

</body>
</html>
