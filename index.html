<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system;
  background: #f5f7fb;
  padding: 10px;
  margin: 0;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 14px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}

/* 横並び */
.row {
  display: flex;
  gap: 8px;
}

#date { flex: 1; }
#amount { flex: 2; }

/* 🔥 カテゴリ */
#categoryList {
  display: flex;
  overflow-x: auto;
  gap: 6px;
  margin-bottom: 10px;
}

.category-wrap {
  display: flex;
  align-items: center;
}

.category-btn {
  padding: 8px 12px;
  border-radius: 8px; /* ←ここがポイント */
  background: #eee;
  border: 1px solid #ccc;
  font-size: 13px;

  width: auto;
  white-space: nowrap;
}
  border: 1px solid #ccc;
  font-size: 13px;

  /* 🔥 幅を内容に合わせる */
  width: auto;
  white-space: nowrap;
}

.category-btn.active {
  background: #4CAF50;
  color: white;
}

/* 削除ボタン */
.delete-btn {
  margin-left: 4px;
  background: #ddd;
  color: #666;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  padding: 0;
  font-size: 12px;
  border: none;
}

/* 押したときだけ少し強調 */
.delete-btn:active {
  background: #bbb;
}
  border-radius: 50%;
  width: 20px;
  height: 20px;
  padding: 0;
  font-size: 12px;
}

/* 履歴 */
.record {
  border-bottom: 1px solid #eee;
  padding: 8px 0;
  display: flex;
  justify-content: space-between;
}

.record-right button {
  margin-left: 4px;
  font-size: 12px;
  padding: 4px 6px;
}

/* グラフ */
.chart-scroll {
  overflow-x: auto;
  position: relative;
}

canvas {
  height: 260px;
}

.tooltip {
  position: absolute;
  background: black;
  color: white;
  padding: 6px;
  border-radius: 6px;
  font-size: 12px;
  display: none;
}
</style>
</head>

<body>

<h2>📊 資産アプリ</h2>

<div class="card">
  <div id="categoryList"></div>
  <input id="newCategory" placeholder="カテゴリ追加">
  <button onclick="addCategory()">追加</button>
</div>

<div class="card">
  <div class="row">
    <input id="date" type="date">
    <input id="amount" type="number" placeholder="金額">
  </div>
  <button onclick="addRecord()">記録</button>
</div>

<!-- 🔥 グラフを先に -->
<div class="card">
  <select id="graphType" onchange="drawChart()">
    <option value="total">総額</option>
    <option value="category">カテゴリ別</option>
  </select>

  <div class="chart-scroll">
    <canvas id="chart"></canvas>
    <div id="tooltip" class="tooltip"></div>
  </div>
</div>

<!-- 🔥 履歴は下 -->
<div class="card">
  <h3>📋 履歴</h3>
  <div id="recordList"></div>
</div>

<script>
let categories = JSON.parse(localStorage.getItem("categories")) || ["現金"];
let records = JSON.parse(localStorage.getItem("records")) || [];
let selectedCategory = categories[0];

document.getElementById("date").value = new Date().toISOString().split("T")[0];

// ===== カテゴリ =====
function addCategory(){
  const name = document.getElementById("newCategory").value.trim();
  if(!name) return;
  if(categories.includes(name)) return;

  categories.push(name);
  document.getElementById("newCategory").value="";
  save(); render();
}

function deleteCategory(name){
  if(!confirm("削除する？")) return;

  categories = categories.filter(c=>c!==name);

  if(selectedCategory===name){
    selectedCategory = categories[0] || "";
  }

  save(); render();
}

function selectCategory(c){
  selectedCategory = c;
  render();
}

function renderCategories(){
  const div = document.getElementById("categoryList");
  div.innerHTML="";

  categories.forEach(c=>{
    const wrap = document.createElement("div");
    wrap.className="category-wrap";

    const btn = document.createElement("button");
    btn.textContent = c;
    btn.className="category-btn";
    if(c===selectedCategory) btn.classList.add("active");
    btn.onclick=()=>selectCategory(c);

    const del = document.createElement("button");
    del.textContent="×";
    del.className="delete-btn";
    del.onclick=()=>deleteCategory(c);

    wrap.appendChild(btn);
    wrap.appendChild(del);
    div.appendChild(wrap);
  });
}

// ===== 記録 =====
function addRecord(){
  const date = document.getElementById("date").value;
  const amount = Number(document.getElementById("amount").value);

  if(!date || !amount) return;

  records.push({date, category:selectedCategory, amount});
  records.sort((a,b)=>new Date(b.date)-new Date(a.date));

  save(); render();
}

function deleteRecord(i){
  if(!confirm("削除する？")) return;
  records.splice(i,1);
  save(); render();
}

function editRecord(i){
  const r = records[i];
  const val = prompt("金額変更", r.amount);
  if(val===null) return;

  r.amount = Number(val);
  save(); render();
}

function renderRecords(){
  const div = document.getElementById("recordList");
  div.innerHTML="";

  records.forEach((r,i)=>{
    div.innerHTML += `
      <div class="record">
        <div>${r.date} / ${r.category} / ${r.amount.toLocaleString()}円</div>
        <div class="record-right">
          <button onclick="editRecord(${i})">編集</button>
          <button onclick="deleteRecord(${i})">削除</button>
        </div>
      </div>
    `;
  });
}

// ===== グラフ =====
function drawChart(){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr,dpr);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(records.length===0) return;

  let map={};
  records.forEach(r=>{
    if(!map[r.date]) map[r.date]=[];
    map[r.date].push(r);
  });

  const dates = Object.keys(map).sort();
  const type = document.getElementById("graphType").value;

  let values = dates.map(d=>{
    if(type==="total"){
      return map[d].reduce((s,r)=>s+r.amount,0);
    }else{
      return map[d]
        .filter(r=>r.category===selectedCategory)
        .reduce((s,r)=>s+r.amount,0);
    }
  });

  const max=Math.max(...values,1);
  canvas.style.width=dates.length*60+"px";

  let points=[];

  values.forEach((v,i)=>{
    const x=i*60+30;
    const y=200-(v/max)*180;

    points.push({x,y,value:v,date:dates[i]});

    if(i>0){
      ctx.beginPath();
      ctx.moveTo(points[i-1].x,points[i-1].y);
      ctx.lineTo(x,y);
      ctx.strokeStyle="#4CAF50";
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle="#4CAF50";
    ctx.fill();
  });

  canvas.onclick=function(e){
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left;

    let closest=points.reduce((a,b)=>
      Math.abs(b.x-x)<Math.abs(a.x-x)?b:a
    );

    const tooltip=document.getElementById("tooltip");
    tooltip.style.display="block";
    tooltip.style.left=closest.x+"px";
    tooltip.style.top=closest.y+"px";
    tooltip.innerHTML=closest.value.toLocaleString()+"円";
  }
}

// ===== 保存 =====
function save(){
  localStorage.setItem("categories", JSON.stringify(categories));
  localStorage.setItem("records", JSON.stringify(records));
}

function render(){
  renderCategories();
  renderRecords();
  drawChart();
}

render();
</script>

</body>
</html>
